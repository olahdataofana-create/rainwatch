<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Monitoring Pos Hujan Sumbar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{
margin:0;
padding:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:260px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.badge{
padding:5px 8px;
border-radius:5px;
color:white;
font-size:12px;
}
</style>
</head>

<body>

<div class="panel">
<div class="title">Monitoring Pos Hujan Sumbar</div>
<div id="summary">Loading...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-0.8,100.6],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map);

function warna(status){

if(status=="NORMAL") return "green";
if(status=="PERLU CEK") return "orange";
if(status=="SUSPECT") return "red";

return "gray";
}

fetch("data.json")
.then(res=>res.json())
.then(data=>{

let normal=0;
let cek=0;
let suspect=0;

data.forEach(d=>{

if(d.status=="NORMAL") normal++;
if(d.status=="PERLU CEK") cek++;
if(d.status=="SUSPECT") suspect++;

L.circleMarker([d.lat,d.lon],{
radius:8,
fillColor:warna(d.status),
color:"#000",
weight:1,
fillOpacity:0.9
})
.addTo(map)
.bindPopup(`
<b>${d.nama_pos}</b><br>
Hujan Pos : ${d.hujan_pos} mm<br>
GSMaP : ${d.gsmap_mm} mm<br>
Status : <b>${d.status}</b>
`);

});

document.getElementById("summary").innerHTML=
`
🟢 Normal : ${normal}<br>
🟠 Perlu Cek : ${cek}<br>
🔴 Suspect : ${suspect}
`;

});

</script>

</body>
</html>
