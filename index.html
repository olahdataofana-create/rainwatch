<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Pos Hujan Sumbar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .header-title {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 10px 20px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .legend {
            background: white; padding: 10px; line-height: 18px;
            color: #555; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="header-title">
        <h2 style="margin:0; font-size: 18px;">RainWatch Sumatera Barat</h2>
        <small>Monitoring Real-time Pos Hujan vs Satelit GSMaP</small>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inisialisasi Peta (Center di Sumbar)
        var map = L.map('map').setView([-0.7399, 100.8000], 8);

        // 2. Tambahkan Lapisan Peta (Basemap)
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Ambil data dari JSON
        fetch('validation_04Apr26.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(pos => {
                    // Tentukan warna berdasarkan status
                    var color = pos.Status === "Suspect" ? "#e74c3c" : "#3498db";
                    
                    // Buat Marker Bulat
                    var marker = L.circleMarker([pos.Lat, pos.Lon], {
                        radius: 10,
                        fillColor: color,
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);

                    // Konten Popup saat diklik
                    var popupContent = `
                        <div style="min-width: 200px;">
                            <h3 style="margin:0 0 10px 0;">${pos['Nama Pos']}</h3>
                            <table style="width:100%; border-collapse: collapse;">
                                <tr><td>Obs (Manual)</td><td>: <b>${pos.Hujan_Obs} mm</b></td></tr>
                                <tr><td>GSMaP (Daily)</td><td>: <b>${pos.Hujan_GSMaP_Daily} mm</b></td></tr>
                                <tr><td>Status</td><td>: <b style="color:${color}">${pos.Status}</b></td></tr>
                            </table>
                            <hr>
                            <p style="font-size: 11px; color: #666;"><b>Analisis AI:</b><br>${pos.Analisis}</p>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                });
            })
            .catch(err => console.error("Gagal memuat data:", err));

        // 4. Tambahkan Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<i style="background: #3498db"></i> Normal<br>';
            div.innerHTML += '<i style="background: #e74c3c"></i> Suspect (Anomali)<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
